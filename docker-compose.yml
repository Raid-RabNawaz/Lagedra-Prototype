services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

  preview:
    build:
      context: .
      target: build
    ports:
      - "4173:4173"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm install && npm run build && npm run preview"

volumes:
  app_node_modules:
